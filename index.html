<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Sanguíneo QR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

    <div class="container">
        <h2>Meu Perfil de Emergência</h2>

        <div id="form-section">
            <input type="text" id="nome" placeholder="Seu Nome Completo">
            <select id="tipoSanguineo">
                <option value="">Selecione seu tipo sanguíneo</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
            <button onclick="gerarPerfil()">Gerar QR Code</button>
        </div>

        <div id="qr-section" style="display:none;">
            <h3>Seu QR Code:</h3>
            <div id="qrcode"></div>
            <p><strong>Nome:</strong> <span id="display-nome"></span></p>
            <p><strong>Tipo:</strong> <span id="display-tipo"></span></p>
            <button onclick="voltar()">Editar Dados</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
