<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergência Segura - QR Code Médico</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="container">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen">
      <header>
        <h1>Emergência Segura</h1>
        <p>QR Code Médico</p>
      </header>
      <div class="content">
        <h2>Faça seu login</h2>
        <input type="email" id="email" placeholder="Seu email" value="teste@email.com">
        <input type="password" id="senha" placeholder="Senha" value="123456">
        <button onclick="fazerLogin()">Entrar</button>
        <p class="info-login">(Use qualquer email e senha para testar)</p>
      </div>
    </div>

    <!-- TELA DE FORMULÁRIO -->
    <div id="formScreen" class="hidden">
      <header>
        <h1>Seus Dados</h1>
      </header>
      <div class="content">
        <label>Nome completo *</label>
        <input type="text" id="nome" placeholder="Ex: Pedro Silva">

        <label>Data de nascimento *</label>
        <input type="date" id="nascimento">

        <label>Tipo sanguíneo *</label>
        <select id="sangue">
          <option value="">Selecione</option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>

        <button onclick="gerarQRCode()">Gerar meu QR Code</button>
      </div>
    </div>

    <!-- TELA DO QR CODE -->
    <div id="qrScreen" class="hidden">
      <header>
        <h1>Seu QR Code Médico</h1>
      </header>
      <div class="content">
        <div class="qr-container">
          <div id="qrcode"></div>
          <div id="qrInfo" class="qr-info"></div>
        </div>
        <button onclick="baixarQRCode()">Baixar QR Code (PNG)</button>
        <button onclick="voltarFormulario()" class="btn-secondary">Editar dados</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
